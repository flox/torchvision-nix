    "hook": {
      "on-activate": "\necho \"\"\necho \"PyTorch Build Environment (parametric builder)\"\necho \"\"\necho \"All PyTorch versions (2.8, 2.9, 2.10) and Python versions (3.11, 3.12, 3.13)\"\necho \"are available from this single branch via parametric builders.\"\necho \"\"\necho \"Quick start examples:\"\necho \"\"\necho \"  PyTorch 2.8 (stable, CUDA 12.8):\"\necho \"    flox build pytorch28-python313-cuda12_8-sm90-avx512       # H100\"\necho \"    flox build pytorch28-python311-cuda12_8-sm86-avx2         # RTX 3090\"\necho \"    flox build pytorch28-python313-cpu-avx2                   # CPU-only\"\necho \"\"\necho \"  PyTorch 2.9 (recommended, multi-CUDA):\"\necho \"    flox build pytorch29-python313-cuda12_9-sm90-avx512       # H100, CUDA 12.9\"\necho \"    flox build pytorch29-python313-cuda13_0-sm103-avx512      # B300, CUDA 13.0\"\necho \"    flox build pytorch29-python311-cuda12_8-sm90-avx512       # vLLM 0.14.x compat\"\necho \"\"\necho \"  PyTorch 2.10 (bleeding-edge, CUDA 13.x):\"\necho \"    flox build pytorch210-python313-cuda13_0-sm90-avx512      # H100, CUDA 13.0\"\necho \"    flox build pytorch210-python313-cuda13_1-sm121-avx512     # Vera Rubin Ultra\"\necho \"    flox build pytorch210-python313-cuda13_0-sm110-armv9      # DRIVE Thor\"\necho \"\"\necho \"  Apple Silicon:\"\necho \"    flox build pytorch29-python313-darwin-mps\"\necho \"\"\necho \"Docs: docs/pytorch-2.8.md | docs/pytorch-2.9.md | docs/pytorch-2.10.md\"\necho \"\"\n"
    },
